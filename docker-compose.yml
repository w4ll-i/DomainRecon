services:
  domainrecon:
    build: .
    container_name: domainrecon
    restart: unless-stopped
    ports:
      - "9000:8000"
    volumes:
      - domainrecon_data:/app/data
      - nuclei_templates:/root/nuclei-templates
      # ── VPN Mullvad (Linux uniquement) ────────────────────────────────────
      # Décommentez ces lignes pour activer le contrôle VPN depuis le conteneur.
      # Sur Windows/macOS Docker Desktop : non nécessaire - si Mullvad est actif
      # sur l'hôte, le trafic du conteneur passe déjà par le VPN automatiquement.
      # - /usr/bin/mullvad:/usr/local/bin/mullvad:ro
      # - /var/run/mullvad-vpn:/var/run/mullvad-vpn
    environment:
      - ENV=production
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  domainrecon_data:
  nuclei_templates:
