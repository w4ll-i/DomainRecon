services:
  domainrecon:
    build: .
    container_name: domainrecon
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - domainrecon_data:/app/data
    environment:
      - ENV=production
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  domainrecon_data:
