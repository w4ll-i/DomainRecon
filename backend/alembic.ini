# Alembic configuration for DomainRecon.
#
# Usage (from the repo root, with the venv active):
#   alembic -c backend/alembic.ini revision --autogenerate -m "your message"
#   alembic -c backend/alembic.ini upgrade head
#   alembic -c backend/alembic.ini current
#
# The database URL is read from env.py (honors $DATABASE_URL; falls back to
# the bundled SQLite at data/domainrecon.db). Do not hardcode it here.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/..
version_path_separator = os
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
